<!-- Team Document Preview Component -->
<div class="dp-card">
    <div class="dp-topbar">
        <div class="dp-topbar-left">
            <div class="dp-icon dp-icon--amber">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </div>
            <div>
                <div class="dp-filename">Team Workspace</div>
                <div class="dp-meta">5 members • 12 docs</div>
            </div>
        </div>
        <span class="dp-badge dp-badge--amber">Team</span>
    </div>

    <div class="dp-body">
        <!-- member avatars -->
        <div class="dp-members">
            <div class="dp-avatar dp-avatar--overlap" style="background:#ddd6fe;color:#7c3aed;z-index:5">AL</div>
            <div class="dp-avatar dp-avatar--overlap" style="background:#d1fae5;color:#059669;z-index:4">MK</div>
            <div class="dp-avatar dp-avatar--overlap" style="background:#fef3c7;color:#d97706;z-index:3">SP</div>
            <div class="dp-avatar dp-avatar--overlap" style="background:#fee2e2;color:#dc2626;z-index:2">JR</div>
            <div class="dp-avatar dp-avatar--overlap dp-avatar--more" style="z-index:1">+2</div>
        </div>

        <!-- activity feed -->
        <div class="dp-activity">
            <div class="dp-activity-row">
                <div class="dp-dot dp-dot--green"></div>
                <span class="dp-activity-text"><strong>AL</strong> signed <em>Service_Agreement.pdf</em></span>
                <span class="dp-activity-time">2m ago</span>
            </div>
            <div class="dp-activity-row">
                <div class="dp-dot dp-dot--amber"></div>
                <span class="dp-activity-text"><strong>MK</strong> viewed <em>NDA_2026.pdf</em></span>
                <span class="dp-activity-time">14m ago</span>
            </div>
            <div class="dp-activity-row">
                <div class="dp-dot dp-dot--purple"></div>
                <span class="dp-activity-text"><strong>SP</strong> sent <em>MSA_Template.pdf</em></span>
                <span class="dp-activity-time">1h ago</span>
            </div>
        </div>
    </div>

    <div class="dp-footer dp-footer--amber">
        <div class="dp-footer-info">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span><strong>3 pending</strong> signatures</span>
        </div>
        <button class="dp-btn dp-btn--amber">View All →</button>
    </div>
</div>
