version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hubsign-web-prod
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 60
             --access-logfile - --error-logfile - hubsign.wsgi:application"
    volumes:
      - staticfiles:/app/staticfiles
      - ./media:/app/media
    expose:
      - "8000"
    environment:
      - SECRET_KEY=[[SECRET_KEY]]
      - DEBUG=False
      - ALLOWED_HOSTS=[[ALLOWED_HOSTS]]
      - CSRF_TRUSTED_ORIGINS=[[CSRF_TRUSTED_ORIGINS]]
      - NEXT_PUBLIC_FEATURE_BILLING_ENABLED=[[NEXT_PUBLIC_FEATURE_BILLING_ENABLED]]
      - NEXT_PRIVATE_STRIPE_API_KEY=[[NEXT_PRIVATE_STRIPE_API_KEY]]
      - NEXT_PRIVATE_STRIPE_WEBHOOK_SECRET=[[NEXT_PRIVATE_STRIPE_WEBHOOK_SECRET]]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hubsign-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: hubsign-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - hubsign-network
    restart: always
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: hubsign-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  staticfiles:

networks:
  hubsign-network:
    driver: bridge
